<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="קבוצות, משחקים וכובשים — LoKohot" />
    <title>LoKohot — ערב משחק</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="admin-topbar">
          <div>
            <h1 class="app-title" id="publicTitle">LoKohot</h1>
            <p class="app-subtitle">מנצחת נשארת · משחקים · כובשים</p>
          </div>
          <a href="./admin.html" class="btn btn--ghost">ניהול</a>
        </div>
      </header>

      <div id="dbBanner" class="banner banner--warn hidden"></div>
      <div id="closedBanner" class="banner banner--warn hidden"></div>
      <div id="errorBanner" class="banner banner--error hidden"></div>

      <div id="publicEmpty" class="panel">
        <p>עדיין לא פורסם ערב משחק.</p>
        <p class="hint">מנהל: היכנס ל<a href="./admin.html">ניהול</a>, אזן קבוצות ולחץ «פרסם לעמוד הציבורי».</p>
      </div>

      <div id="publicContent" class="hidden">
        <section class="teams" aria-label="קבוצות">
          <div class="team-col team-col--green">
            <header class="team-header">
              <span class="team-dot team-dot--green"></span>
              <h3>ירוק</h3>
            </header>
            <ul class="team-list" data-public-team="green"></ul>
          </div>
          <div class="team-col team-col--yellow">
            <header class="team-header">
              <span class="team-dot team-dot--yellow"></span>
              <h3>צהוב</h3>
            </header>
            <ul class="team-list" data-public-team="yellow"></ul>
          </div>
          <div class="team-col team-col--orange">
            <header class="team-header">
              <span class="team-dot team-dot--orange"></span>
              <h3>כתום</h3>
            </header>
            <ul class="team-list" data-public-team="orange"></ul>
          </div>
        </section>

        <section class="panel pitch-panel">
          <h2 class="panel-title">מנצחת נשארת</h2>
          <p id="pitchStatus" class="pitch-status"></p>
        </section>

        <section id="addGameSection" class="panel hidden">
          <h2 class="panel-title">הוסף משחק</h2>
          <form id="addGameForm" class="add-game-form">
            <select id="gameHomeTeam" class="input" required aria-label="קבוצה בית"></select>
            <span class="match-row__vs">נגד</span>
            <select id="gameAwayTeam" class="input" required aria-label="קבוצה חוץ"></select>
            <input type="number" id="gameHomeScore" class="input input--score" min="0" max="99" value="0" required aria-label="שערי בית" />
            <span>:</span>
            <input type="number" id="gameAwayScore" class="input input--score" min="0" max="99" value="0" required aria-label="שערי חוץ" />
            <button type="submit" class="btn btn--primary btn--compact">הוסף משחק</button>
          </form>
          <p class="hint">כל אחד יכול להוסיף או לעדכן משחקים עד שהמנהל סוגר את הערב.</p>
        </section>

        <section class="panel">
          <h2 class="panel-title">משחקים</h2>
          <div id="matchesList"></div>
          <div id="nightGoalsSummary" class="night-summary hidden"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/public.ts"></script>
  </body>
</html>
